<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#EDE6D5">
<title>LogIt</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Sriracha&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #EDE6D5;
    --card: #FFFFFF;
    --field: #F0EADA;
    --text: #2B2620;
    --text-secondary: #8A8676;
    --push: #C1633E;
    --pull: #5C6670;
    --legs: #74845A;
    --change-up: #4C8A3E;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Sriracha', cursive;
    padding-bottom: 40px;
    overflow-x: hidden;
  }
  .page {
    max-width: 460px;
    margin: 0 auto;
    padding: 24px 16px 8px;
  }
  .screen { display: none; }
  .screen.active { display: block; }

  /* Title screen */
  .title-wrap {
    text-align: center;
    padding-top: 60px;
  }
  .title-wrap h1 {
    font-size: 30px;
    margin-bottom: 50px;
    color: var(--text);
  }
  .big-btn {
    display: block;
    width: 100%;
    background: var(--card);
    border: none;
    border-radius: 20px;
    padding: 20px;
    font-family: 'Sriracha', cursive;
    font-size: 20px;
    color: var(--text);
    margin-bottom: 16px;
    cursor: pointer;
  }
  .big-btn.primary { border-left: 6px solid var(--push); }
  .big-btn.secondary { border-left: 6px solid var(--pull); }

  /* Session header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 18px;
  }
  .session-label { font-size: 15px; color: var(--text-secondary); }
  .session-date { font-size: 14px; color: var(--text-secondary); }

  /* Card */
  .card {
    background: var(--card);
    border-radius: 20px;
    padding: 20px 24px;
    border-left: 6px solid var(--cat-color, var(--push));
    margin-bottom: 14px;
  }
  .card-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }
  .card-left {
    display: flex;
    gap: 7px;
    align-items: center;
    flex: 1;
    min-width: 0;
  }
  .icon-img {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    flex-shrink: 0;
    object-fit: cover;
  }
  .name-block { display: flex; flex-direction: column; flex: 1; min-width: 0; }
  .name { font-size: 20px; color: var(--text); line-height: 1.25; }
  .change-up { font-size: 16px; color: var(--change-up); margin-top: 2px; }

  .icon-wrap {
    position: relative;
    flex-shrink: 0;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .icon-badge {
    position: absolute;
    bottom: -2px;
    right: -2px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: #4C8A3E;
    border: 2px solid var(--card);
    display: none;
    align-items: center;
    justify-content: center;
  }
  .icon-wrap.flagged .icon-badge { display: flex; }

  .fields { display: flex; gap: 28px; }
  .field-group { display: flex; align-items: baseline; gap: 8px; }
  .field-group input {
    font-family: 'Sriracha', cursive;
    font-size: 19px;
    color: var(--text);
    border: none;
    border-bottom: 2px solid var(--cat-color, var(--push));
    background: transparent;
    padding: 0 0 3px 0;
    outline: none;
    min-width: 24px;
    max-width: 70px;
    text-align: center;
  }
  .unit {
    font-family: 'Sriracha', cursive;
    font-size: 16px;
    color: var(--text-secondary);
  }

  .legend {
    display: flex;
    gap: 14px;
    font-size: 12px;
    color: var(--text-secondary);
    margin: 10px 0 20px;
    flex-wrap: wrap;
  }
  .legend span { display: inline-flex; align-items: center; gap: 4px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

  .save-btn {
    width: 100%;
    background: var(--push);
    color: var(--card);
    border: none;
    border-radius: 16px;
    padding: 18px;
    font-family: 'Sriracha', cursive;
    font-size: 18px;
    cursor: pointer;
    margin-top: 4px;
  }
  .back-link {
    display: inline-block;
    margin-bottom: 16px;
    font-size: 15px;
    color: var(--text-secondary);
    cursor: pointer;
  }

  /* History */
  .hist-card {
    background: var(--card);
    border-radius: 16px;
    padding: 14px 18px;
    border-left: 6px solid var(--cat-color, var(--push));
    margin-bottom: 12px;
  }
  .hist-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .hist-name { display: flex; align-items: center; gap: 7px; font-size: 16px; }
  .hist-name img { width: 30px; height: 30px; border-radius: 50%; }
  .delta { font-size: 13px; font-weight: bold; }
  .delta.up { color: var(--change-up); }
  .delta.down { color: #B84C3C; }
  .delta.same { color: var(--text-secondary); }
  .sparkline { margin-top: 8px; }

  /* Splash */
  .splash {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
    z-index: 100;
  }
  .splash.show { opacity: 1; pointer-events: all; }
  .splash-msg { font-size: 26px; text-align: center; padding: 0 40px; color: var(--text); z-index: 2; position: relative; }

  #startup-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    transition: opacity 0.35s ease;
  }
  #startup-overlay img {
    width: 96px;
    height: 96px;
    border-radius: 22px;
  }
  #startup-overlay.hide {
    opacity: 0;
    pointer-events: none;
  }
  .confetti-layer {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .firework-burst {
    position: absolute;
    width: 0;
    height: 0;
  }
  .firework-particle {
    position: absolute;
    top: 0;
    left: 0;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    animation: firework-pop 0.9s ease-out forwards;
  }
  @keyframes firework-pop {
    0% { transform: translate(0, 0) scale(1); opacity: 1; }
    70% { opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(0.3); opacity: 0; }
  }
</style>
<script src="vendor/xlsx.full.min.js"></script>
</head>
<body>

<div id="startup-overlay">
  <img src="icons/icon-512.png" alt="">
</div>

<div class="page">

  <div id="screen-title" class="screen active">
    <div class="title-wrap">
      <h1>LogIt</h1>
      <button class="big-btn primary" id="btn-start">Start new session</button>
      <button class="big-btn secondary" id="btn-history">View history</button>
      <button class="big-btn secondary" id="btn-backups">Backups</button>
    </div>
  </div>

  <div id="screen-session" class="screen">
    <div class="back-link" id="btn-back-title">&larr; back</div>
    <div class="header">
      <span class="session-label" id="session-label">Session 1</span>
      <span class="session-date" id="session-date"></span>
    </div>
    <div id="cards"></div>
    <div class="legend">
      <span><span class="dot" style="background:var(--push)"></span>push</span>
      <span><span class="dot" style="background:var(--pull)"></span>pull</span>
      <span><span class="dot" style="background:var(--legs)"></span>legs</span>
    </div>
    <button class="save-btn" id="save-btn">Save session</button>
  </div>

  <div id="screen-history" class="screen">
    <div class="back-link" id="btn-back-title-2">&larr; back</div>
    <div class="header"><span class="session-label">History</span></div>
    <div id="history-cards"></div>
  </div>

  <div id="screen-backups" class="screen">
    <div class="back-link" id="btn-back-title-3">&larr; back</div>
    <div class="header"><span class="session-label">Backups</span></div>
    <button class="save-btn" id="export-btn" style="margin-top:10px;">Export to Excel</button>
    <button class="big-btn secondary" id="restore-btn" style="margin-top:10px;">Restore from backup</button>
  </div>

</div>

<div class="splash" id="splash">
  <div class="confetti-layer" id="confetti-layer"></div>
  <div class="splash-msg" id="splash-msg"></div>
</div>

<script>
const EXERCISES = [
  { id: 'bench_press', name: 'Dumbbell bench press', category: 'push', icon: 'icons/dumbbell_chest_press.png' },
  { id: 'chest_fly_together', name: 'Dumbbell chest together', category: 'push', icon: 'icons/chest_together.png' },
  { id: 'chest_fly_open_close', name: 'Dumbbell chest fly', category: 'push', icon: 'icons/open_chest_fly.png' },
  { id: 'overhead_press', name: 'Dumbbell overhead press', category: 'push', icon: 'icons/overhead_press.png' },
  { id: 'row', name: 'Single-arm dumbbell row', category: 'pull', icon: 'icons/dumbbell_back_pull.png' },
  { id: 'pullup', name: 'Pull-up', category: 'pull', icon: 'icons/pullup.png' },
  { id: 'rear_delt_fly', name: 'Rear delt fly', category: 'pull', icon: 'icons/rear_delt_fly.png' },
  { id: 'bicep_curl', name: 'Dumbbell bicep curl', category: 'pull', icon: 'icons/bicep_curl.png' },
  { id: 'leg_extension', name: 'Leg extension', category: 'legs', icon: 'icons/leg_extension.png' },
  { id: 'squat', name: 'Squats', category: 'legs', icon: 'icons/squat.png' }
];

const CATEGORY_COLOR = { push: 'var(--push)', pull: 'var(--pull)', legs: 'var(--legs)' };
const CATEGORY_HEX = { push: '#C1633E', pull: '#5C6670', legs: '#74845A' };

const SPLASH_MESSAGES = [
  'Great job.',
  'Nice work today.',
  'Session logged. Keep it up.',
  "That's another one in the books.",
  'Solid session. See you next time.',
  'Logged. You showed up, that\'s what counts.',
  'Nice work — small steps add up.',
  'Done for today. Well earned.',
  'Good session. Onward.'
];

function loadJSON(key, fallback) {
  try { return JSON.parse(localStorage.getItem(key)) || fallback; }
  catch (e) { return fallback; }
}
function saveJSON(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

// --- Cloudflare Worker backup config ---
// Replace these two values once your Worker is deployed.
const BACKUP_URL = 'https://workout-log-backup.itamar-a88.workers.dev';
const AUTH_TOKEN = 'xk29fJ3mQpL8vN4wRt7yZc1';

let sessions = loadJSON('wl_sessions', []);
let flags = loadJSON('wl_flags', {});

async function backupToServer() {
  if (BACKUP_URL.includes('REPLACE-WITH')) return; // not configured yet
  try {
    await fetch(`${BACKUP_URL}/backup`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Auth-Token': AUTH_TOKEN
      },
      body: JSON.stringify({ sessions, flags })
    });
  } catch (err) {
    // silent failure — backup is best-effort, shouldn't block the user
    console.warn('Backup failed:', err);
  }
}

async function restoreFromServer() {
  if (BACKUP_URL.includes('REPLACE-WITH')) {
    alert('Backup server isn\'t configured yet.');
    return;
  }
  const confirmed = confirm('This will replace your current data on this device with the last backed-up version. Continue?');
  if (!confirmed) return;

  try {
    const res = await fetch(`${BACKUP_URL}/restore`, {
      headers: { 'X-Auth-Token': AUTH_TOKEN }
    });
    if (!res.ok) throw new Error('Restore request failed');
    const data = await res.json();
    sessions = data.sessions || [];
    flags = data.flags || {};
    saveJSON('wl_sessions', sessions);
    saveJSON('wl_flags', flags);
    alert('Restore complete.');
    renderHistoryScreen();
  } catch (err) {
    alert('Restore failed — check your connection and try again.');
    console.warn('Restore failed:', err);
  }
}

// Silent auto-sync: on load, adopt the server's copy if it's ahead of
// what's stored on this device — no prompts, no interruption.
async function autoSyncOnLoad() {
  if (BACKUP_URL.includes('REPLACE-WITH')) return;
  try {
    const res = await fetch(`${BACKUP_URL}/restore`, {
      headers: { 'X-Auth-Token': AUTH_TOKEN }
    });
    if (!res.ok) return;
    const data = await res.json();
    const serverSessions = data.sessions || [];
    if (serverSessions.length > sessions.length) {
      sessions = serverSessions;
      flags = data.flags || {};
      saveJSON('wl_sessions', sessions);
      saveJSON('wl_flags', flags);
    }
  } catch (err) {
    console.warn('Auto-sync failed (offline?):', err);
  }
}
let sessionFlags = {};

function getLastEntry(exId) {
  for (let i = sessions.length - 1; i >= 0; i--) {
    if (sessions[i].entries[exId]) return sessions[i].entries[exId];
  }
  return null;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function makeNoiseBuffer(ctx, duration) {
  const n = Math.floor(ctx.sampleRate * duration);
  const buffer = ctx.createBuffer(1, n, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < n; i++) data[i] = Math.random() * 2 - 1;
  return buffer;
}

function playClickSound() {
  const ctx = getAudioCtx();
  const t = ctx.currentTime;

  // sharp high transient ("snap")
  const snapSource = ctx.createBufferSource();
  snapSource.buffer = makeNoiseBuffer(ctx, 0.006);
  const snapFilter = ctx.createBiquadFilter();
  snapFilter.type = 'highpass';
  snapFilter.frequency.value = 4000;
  const snapGain = ctx.createGain();
  snapGain.gain.setValueAtTime(0.5, t);
  snapGain.gain.exponentialRampToValueAtTime(0.001, t + 0.02);
  snapSource.connect(snapFilter).connect(snapGain).connect(ctx.destination);
  snapSource.start(t);

  // low-mid body noise underneath, for felt weight
  const bodySource = ctx.createBufferSource();
  bodySource.buffer = makeNoiseBuffer(ctx, 0.03);
  const bodyFilter = ctx.createBiquadFilter();
  bodyFilter.type = 'bandpass';
  bodyFilter.frequency.value = 1200;
  bodyFilter.Q.value = 0.8;
  const bodyGain = ctx.createGain();
  bodyGain.gain.setValueAtTime(0.32, t);
  bodyGain.gain.exponentialRampToValueAtTime(0.001, t + 0.03);
  bodySource.connect(bodyFilter).connect(bodyGain).connect(ctx.destination);
  bodySource.start(t);
}

function renderSessionScreen() {
  sessionFlags = {};
  const cardsEl = document.getElementById('cards');
  cardsEl.innerHTML = '';

  EXERCISES.forEach(ex => {
    const last = getLastEntry(ex.id);
    const wasFlagged = !!flags[ex.id];
    const lastWeight = last ? last.weight : '';
    const lastReps = last ? last.reps : '';
    const iconSrc = ex.icon;

    const card = document.createElement('div');
    card.className = 'card';
    card.style.setProperty('--cat-color', CATEGORY_COLOR[ex.category]);
    card.dataset.id = ex.id;

    card.innerHTML = `
      <div class="card-top">
        <div class="card-left">
          <div class="icon-wrap" data-id="${ex.id}" role="button" aria-label="Mark ready to increase weight">
            <img class="icon-img" src="${iconSrc}" data-icon-for="${ex.id}">
            <span class="icon-badge"><svg width="13" height="13" viewBox="0 0 20 20"><path d="M10 15V6M6 10L10 5L14 10" stroke="#F7F4EC" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></span>
          </div>
          <div class="name-block">
            <div class="name">${ex.name}</div>
            ${wasFlagged ? '<div class="change-up">💪 Change weight 💪</div>' : ''}
          </div>
        </div>
      </div>
      <div class="fields">
        <div class="field-group">
          <input type="text" inputmode="decimal" data-id="${ex.id}" data-field="weight" value="${lastWeight}">
          <span class="unit">kg</span>
        </div>
        <div class="field-group">
          <input type="text" inputmode="numeric" data-id="${ex.id}" data-field="reps" value="${lastReps}">
          <span class="unit">reps</span>
        </div>
      </div>
    `;
    cardsEl.appendChild(card);
  });

  cardsEl.querySelectorAll('.icon-wrap').forEach(wrap => {
    wrap.addEventListener('click', () => {
      const id = wrap.dataset.id;
      playClickSound();
      sessionFlags[id] = !sessionFlags[id];
      wrap.classList.toggle('flagged', sessionFlags[id]);
    });
  });

  updateSessionLabel();
}

function updateSessionLabel() {
  document.getElementById('session-label').textContent = `Session ${sessions.length + 1}`;
  document.getElementById('session-date').textContent = new Date().toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}

document.getElementById('save-btn').addEventListener('click', () => {
  const entries = {};
  const newFlags = {};

  EXERCISES.forEach(ex => {
    const weightInput = document.querySelector(`input[data-id="${ex.id}"][data-field="weight"]`);
    const repsInput = document.querySelector(`input[data-id="${ex.id}"][data-field="reps"]`);
    const weightRaw = weightInput.value.trim();
    const weightNum = parseFloat((weightRaw.match(/[\d.]+/g) || [0]).map(Number).reduce((a, b) => Math.max(a, b), 0));
    const reps = repsInput.value.trim();
    const previousLast = getLastEntry(ex.id);

    entries[ex.id] = { weight: weightRaw, weightNum, reps };

    const wasFlagged = !!flags[ex.id];
    const flaggedThisSession = !!sessionFlags[ex.id];

    if (wasFlagged && previousLast && weightNum > previousLast.weightNum) {
      newFlags[ex.id] = false;
    } else {
      newFlags[ex.id] = flaggedThisSession;
    }
  });

  sessions.push({ date: new Date().toISOString(), entries });
  flags = newFlags;
  saveJSON('wl_sessions', sessions);
  saveJSON('wl_flags', flags);
  backupToServer();

  showSplash();
});

function launchConfetti() {
  const layer = document.getElementById('confetti-layer');
  layer.innerHTML = '';
  const colors = ['#C1633E', '#5C6670', '#74845A', '#B7DDA8', '#E8C34A'];
  const burstPositions = [
    { x: 25, y: 30, delay: 0 },
    { x: 70, y: 22, delay: 250 },
    { x: 50, y: 40, delay: 500 },
    { x: 82, y: 45, delay: 750 }
  ];

  burstPositions.forEach(pos => {
    setTimeout(() => {
      const burst = document.createElement('div');
      burst.className = 'firework-burst';
      burst.style.left = pos.x + '%';
      burst.style.top = pos.y + '%';

      const particleCount = 16;
      for (let i = 0; i < particleCount; i++) {
        const angle = (Math.PI * 2 * i) / particleCount + (Math.random() * 0.3);
        const distance = 50 + Math.random() * 40;
        const dx = Math.cos(angle) * distance;
        const dy = Math.sin(angle) * distance;

        const particle = document.createElement('div');
        particle.className = 'firework-particle';
        particle.style.background = colors[Math.floor(Math.random() * colors.length)];
        particle.style.setProperty('--dx', dx + 'px');
        particle.style.setProperty('--dy', dy + 'px');
        particle.style.animationDelay = (Math.random() * 0.05) + 's';
        burst.appendChild(particle);
      }
      layer.appendChild(burst);
      setTimeout(() => burst.remove(), 1000);
    }, pos.delay);
  });
}

function showSplash() {
  const splash = document.getElementById('splash');
  const msgEl = document.getElementById('splash-msg');
  msgEl.textContent = SPLASH_MESSAGES[Math.floor(Math.random() * SPLASH_MESSAGES.length)];
  launchConfetti();
  splash.classList.add('show');
  setTimeout(() => {
    showScreen('screen-title');
    splash.classList.remove('show');
  }, 2200);
}

function deltaBadge(current, previous) {
  if (previous === null || previous === undefined) return { text: 'first log', cls: 'same' };
  const diff = current - previous;
  if (diff > 0) return { text: `+${diff} kg`, cls: 'up' };
  if (diff < 0) return { text: `${diff} kg`, cls: 'down' };
  return { text: 'same', cls: 'same' };
}

function sparklineSVG(values) {
  if (values.length < 2) return '<div style="font-size:12px;color:var(--text-secondary);">not enough data yet</div>';
  const w = 260, h = 40, pad = 4;
  const min = Math.min(...values), max = Math.max(...values);
  const range = max - min || 1;
  const points = values.map((v, i) => {
    const x = pad + (i / (values.length - 1)) * (w - pad * 2);
    const y = h - pad - ((v - min) / range) * (h - pad * 2);
    return `${x},${y}`;
  }).join(' ');
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <polyline points="${points}" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

function renderHistoryScreen() {
  const el = document.getElementById('history-cards');
  el.innerHTML = '';

  EXERCISES.forEach(ex => {
    const values = sessions
      .filter(s => s.entries[ex.id])
      .map(s => s.entries[ex.id].weightNum);

    if (values.length === 0) return;

    const current = values[values.length - 1];
    const previous = values.length > 1 ? values[values.length - 2] : null;
    const badge = deltaBadge(current, previous);

    const iconSrc = ex.icon;

    const card = document.createElement('div');
    card.className = 'hist-card';
    card.style.setProperty('--cat-color', CATEGORY_COLOR[ex.category]);
    card.innerHTML = `
      <div class="hist-top">
        <div class="hist-name"><img src="${iconSrc}">${ex.name}</div>
        <div class="delta ${badge.cls}">${badge.text}</div>
      </div>
      <div class="sparkline" style="color:${CATEGORY_HEX[ex.category]}">${sparklineSVG(values)}</div>
    `;
    el.appendChild(card);
  });

  if (el.children.length === 0) {
    el.innerHTML = '<div style="text-align:center;color:var(--text-secondary);margin-top:40px;">No sessions logged yet.</div>';
  }
}

document.getElementById('btn-start').addEventListener('click', () => {
  renderSessionScreen();
  showScreen('screen-session');
});
document.getElementById('btn-history').addEventListener('click', () => {
  renderHistoryScreen();
  showScreen('screen-history');
});
async function exportToExcel() {
  const rows = [];
  const lastSession = sessions[sessions.length - 1];
  const dateStr = lastSession
    ? new Date(lastSession.date).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' })
    : '';

  EXERCISES.forEach(ex => {
    const entry = getLastEntry(ex.id);
    if (entry) {
      rows.push({
        Date: dateStr,
        Exercise: ex.name,
        'Weight (kg)': entry.weight,
        Reps: entry.reps
      });
    }
  });

  if (rows.length === 0) {
    alert('No sessions logged yet — nothing to export.');
    return;
  }

  const worksheet = XLSX.utils.json_to_sheet(rows);
  const workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, worksheet, 'LogIt');
  worksheet['!cols'] = [
    { wch: 12 }, { wch: 28 }, { wch: 12 }, { wch: 10 }
  ];

  const today = new Date().toISOString().split('T')[0];
  const filename = `workout-log-${today}.xlsx`;
  const arrayBuffer = XLSX.write(workbook, { bookType: 'xlsx', type: 'array' });
  const mimeType = 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet';
  const blob = new Blob([arrayBuffer], { type: mimeType });
  const file = new File([blob], filename, { type: mimeType });

  let shared = false;

  if (navigator.share) {
    const shareData = { files: [file], title: 'LogIt export', text: 'My LogIt export' };
    if (navigator.canShare) {
      console.log('canShare check result:', navigator.canShare(shareData));
    }
    try {
      await navigator.share(shareData);
      shared = true;
    } catch (err) {
      if (err.name === 'AbortError') return; // user cancelled — don't also trigger a download
      console.warn('Share failed, falling back to download:', err.name, err.message);
    }
  }

  if (shared) return;

  // fallback: plain download (desktop browsers, or unsupported devices)
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

document.getElementById('export-btn').addEventListener('click', exportToExcel);

  });
}
</script>
