<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#EDE6D5">
<title>LogIt</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Sriracha&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #EDE6D5;
    --card: #FFFFFF;
    --field: #F0EADA;
    --text: #2B2620;
    --text-secondary: #8A8676;
    --push: #C1633E;
    --pull: #5C6670;
    --legs: #74845A;
    --change-up: #4C8A3E;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Sriracha', cursive;
    padding-bottom: 16px;
    overflow-x: hidden;
  }
  .page {
    max-width: 460px;
    margin: 0 auto;
    padding: 16px 16px 8px;
  }
  .screen { display: none; }
  .screen.active { display: block; }

  /* Title screen */
  .title-wrap {
    text-align: center;
    padding-top: 45px;
  }
  .title-wrap h1 {
    font-size: 30px;
    margin-bottom: 24px;
    color: var(--text);
  }
  .big-btn {
    display: block;
    width: 100%;
    background: var(--card);
    border: none;
    border-radius: 20px;
    padding: 16px;
    font-family: 'Sriracha', cursive;
    font-size: 20px;
    color: var(--text);
    margin-bottom: 12px;
    cursor: pointer;
  }
  .big-btn.primary { border-left: 6px solid var(--push); }
  .big-btn.secondary { border-left: 6px solid var(--pull); }

  /* Session header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 18px;
  }
  .session-label { font-size: 15px; color: var(--text-secondary); }
  .session-date { font-size: 14px; color: var(--text-secondary); }

  /* Card */
  .card {
    background: var(--card);
    border-radius: 20px;
    padding: 20px 24px;
    border-left: 6px solid var(--cat-color, var(--push));
    margin-bottom: 14px;
  }
  .card-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }
  .card-left {
    display: flex;
    gap: 7px;
    align-items: center;
    flex: 1;
    min-width: 0;
  }
  .icon-img {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    flex-shrink: 0;
    object-fit: cover;
  }
  .name-block { display: flex; flex-direction: column; flex: 1; min-width: 0; }
  .name { font-size: 20px; color: var(--text); line-height: 1.25; }
  .change-up { font-size: 16px; color: var(--change-up); margin-top: 2px; }

  .icon-wrap {
    position: relative;
    flex-shrink: 0;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .icon-badge {
    position: absolute;
    bottom: -2px;
    right: -2px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: #4C8A3E;
    border: 2px solid var(--card);
    display: none;
    align-items: center;
    justify-content: center;
  }
  .icon-wrap.flagged .icon-badge { display: flex; }

  .fields { display: flex; gap: 28px; }
  .field-group { display: flex; align-items: baseline; gap: 8px; }
  .field-group input {
    font-family: 'Sriracha', cursive;
    font-size: 19px;
    color: var(--text);
    border: none;
    border-bottom: 2px solid var(--cat-color, var(--push));
    background: transparent;
    padding: 0 0 3px 0;
    outline: none;
    min-width: 24px;
    max-width: 70px;
    text-align: center;
  }
  .unit {
    font-family: 'Sriracha', cursive;
    font-size: 16px;
    color: var(--text-secondary);
  }

  .legend {
    display: flex;
    gap: 14px;
    font-size: 12px;
    color: var(--text-secondary);
    margin: 10px 0 20px;
    flex-wrap: wrap;
  }
  .legend span { display: inline-flex; align-items: center; gap: 4px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

  .save-btn {
    width: 100%;
    background: var(--push);
    color: var(--card);
    border: none;
    border-radius: 16px;
    padding: 18px;
    font-family: 'Sriracha', cursive;
    font-size: 18px;
    cursor: pointer;
    margin-top: 4px;
  }
  .back-link {
    display: inline-block;
    margin-bottom: 16px;
    font-size: 15px;
    color: var(--text-secondary);
    cursor: pointer;
  }

  /* History */
  .hist-card {
    background: var(--card);
    border-radius: 16px;
    padding: 14px 18px;
    border-left: 6px solid var(--cat-color, var(--push));
    margin-bottom: 12px;
  }
  .hist-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .hist-name { display: flex; align-items: center; gap: 7px; font-size: 16px; }
  .hist-name img { width: 30px; height: 30px; border-radius: 50%; }
  .delta { font-size: 13px; font-weight: bold; }
  .delta.up { color: var(--change-up); }
  .delta.down { color: #B84C3C; }
  .delta.same { color: var(--text-secondary); }
  .sparkline { margin-top: 8px; }

  .hist-toggle-btn {
    font-family: 'Sriracha', cursive;
    font-size: 13px;
    padding: 8px 16px;
    border-radius: 10px;
    border: 1.5px solid var(--text-secondary);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
  }
  .hist-toggle-btn.active {
    background: var(--push);
    border-color: var(--push);
    color: #FFFFFF;
  }

  /* Manage exercises */
  .manage-section-label {
    font-size: 13px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 10px;
  }
  .exercise-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card);
    border-radius: 14px;
    padding: 10px 14px;
    margin-bottom: 10px;
    border-left: 5px solid var(--cat-color, var(--push));
    touch-action: pan-y;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
  }
  .exercise-row.dragging-placeholder {
    opacity: 0.35;
  }
  .drag-ghost {
    position: fixed;
    z-index: 1000;
    pointer-events: none;
    opacity: 0.97;
    box-shadow: 0 10px 24px rgba(0,0,0,0.28);
    background: var(--card);
  }
  .exercise-row .drag-handle {
    color: var(--text-secondary);
    font-size: 20px;
    cursor: grab;
    flex-shrink: 0;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: none;
    -webkit-touch-callout: none;
  }
  .exercise-row img.row-icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    flex-shrink: 0;
    object-fit: cover;
  }
  .exercise-row .row-name {
    flex: 1;
    min-width: 0;
    font-size: 15px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .exercise-row .row-actions {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  .row-action-btn {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 8px;
    border: 1px solid var(--text-secondary);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
  }
  .row-action-btn.danger { border-color: #B84C3C; color: #B84C3C; }

  /* Splash */
  .splash {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
    z-index: 100;
  }
  .splash.show { opacity: 1; pointer-events: all; }
  .splash-msg { font-size: 26px; text-align: center; padding: 0 40px; color: var(--text); z-index: 2; position: relative; }

  .confetti-layer {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .firework-burst {
    position: absolute;
    width: 0;
    height: 0;
  }
  .firework-particle {
    position: absolute;
    top: 0;
    left: 0;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    animation: firework-pop 0.9s ease-out forwards;
  }
  @keyframes firework-pop {
    0% { transform: translate(0, 0) scale(1); opacity: 1; }
    70% { opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(0.3); opacity: 0; }
  }
</style>
<script src="vendor/xlsx.full.min.js"></script>
</head>
<body>

<div class="page">

  <div id="screen-title" class="screen active">
    <div class="title-wrap">
      <img src="icons/icon-512.png" alt="" style="width:144px;height:144px;border-radius:33px;margin-top:16px;margin-bottom:8px;">

    <button class="big-btn primary" id="export-btn" style="margin-top:10px;">Export exercises to Excel</button>
    <button class="big-btn secondary" id="restore-btn" style="margin-top:10px;">Restore exercises from server</button>
    <div style="height:90px;"></div>
    <button id="export-all-btn" style="display:block;margin:0 auto;padding:10px 18px;border-radius:10px;border:1.5px solid #8A5A3A;background:transparent;color:#8A5A3A;font-family:'Sriracha',cursive;font-size:13px;">Export all app data</button>

  <div id="screen-manage-exercises" class="screen">

    <div class="header"><span class="session-label">Manage exercises</span></div>
    <button class="big-btn primary" id="btn-add-exercise" style="margin-bottom:20px;">+ Add new exercise</button>
    <div class="manage-section-label">Active</div>

  <div id="screen-add-exercise" class="screen">

      <button class="category-btn" data-category="pull" style="flex:1;padding:14px;border-radius:12px;border:2px solid var(--pull);background:transparent;color:var(--pull);font-family:'Sriracha',cursive;font-size:15px;">pull</button>
      <button class="category-btn" data-category="legs" style="flex:1;padding:14px;border-radius:12px;border:2px solid var(--legs);background:transparent;color:var(--legs);font-family:'Sriracha',cursive;font-size:15px;">legs</button>

<script>
const BUILT_IN_EXERCISES = [
  { id: 'bench_press', name: 'Dumbbell bench press', category: 'push', icon: 'icons/dumbbell_chest_press.png' },
  { id: 'chest_fly_together', name: 'Dumbbell chest together', category: 'push', icon: 'icons/chest_together.png' },
  { id: 'chest_fly_open_close', name: 'Dumbbell chest fly', category: 'push', icon: 'icons/open_chest_fly.png' },
  { id: 'overhead_press', name: 'Dumbbell overhead press', category: 'push', icon: 'icons/overhead_press.png' },
  { id: 'row', name: 'Single-arm dumbbell row', category: 'pull', icon: 'icons/dumbbell_back_pull.png' },
  { id: 'pullup', name: 'Pull-up', category: 'pull', icon: 'icons/pullup.png' },
  { id: 'rear_delt_fly', name: 'Rear delt fly', category: 'pull', icon: 'icons/rear_delt_fly.png' },
  { id: 'bicep_curl', name: 'Dumbbell bicep curl', category: 'pull', icon: 'icons/bicep_curl.png' },
  { id: 'leg_extension', name: 'Leg extension', category: 'legs', icon: 'icons/leg_extension.png' },
  { id: 'squat', name: 'Squats', category: 'legs', icon: 'icons/squat.png' }
];

const CATEGORY_COLOR = { push: 'var(--push)', pull: 'var(--pull)', legs: 'var(--legs)' };
const CATEGORY_HEX = { push: '#C1633E', pull: '#5C6670', legs: '#74845A' };
const PLACEHOLDER_ICON = 'icons/placeholder.png';

const SPLASH_MESSAGES = [
  'Great job.',
  'Nice work today.',
  'Session logged. Keep it up.',
  "That's another one in the books.",
  'Solid session. See you next time.',
  'Logged. You showed up, that\'s what counts.',
  'Nice work — small steps add up.',
  'Done for today. Well earned.',
  'Good session. Onward.'
];

function loadJSON(key, fallback) {
  try { return JSON.parse(localStorage.getItem(key)) || fallback; }
  catch (e) { return fallback; }
}
function saveJSON(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

// --- Cloudflare Worker backup config ---
const BACKUP_URL = 'https://workout-log-backup.itamar-a88.workers.dev';
const AUTH_TOKEN = 'xk29fJ3mQpL8vN4wRt7yZc1';

let sessions = loadJSON('wl_sessions', []);
let flags = loadJSON('wl_flags', {});
let historyArchive = loadJSON('wl_history_archive', []);

function getAllSessionData() {
  return [...historyArchive, ...sessions];
}

// --- Custom exercise system ---
// customExercises: user-added exercises, stored fully as data (including base64 icon).
// exerciseMeta: per-exercise state (hidden) keyed by id, applies to built-in AND custom.
// exerciseOrder: array of ids defining display order across all exercises.
let customExercises = loadJSON('wl_custom_exercises', []);
let exerciseMeta = loadJSON('wl_exercise_meta', {});
let exerciseOrder = loadJSON('wl_exercise_order', null);

function getAllExercises() {
  const all = [...BUILT_IN_EXERCISES, ...customExercises];
  if (!exerciseOrder) {
    exerciseOrder = all.map(e => e.id);
    saveJSON('wl_exercise_order', exerciseOrder);
  }
  // include any exercise not yet in the saved order (newly added), append at end
  const orderedIds = exerciseOrder.filter(id => all.some(e => e.id === id));
  all.forEach(e => { if (!orderedIds.includes(e.id)) orderedIds.push(e.id); });
  if (orderedIds.length !== exerciseOrder.length) {
    exerciseOrder = orderedIds;
    saveJSON('wl_exercise_order', exerciseOrder);
  }
  const byId = Object.fromEntries(all.map(e => [e.id, e]));
  return orderedIds.map(id => byId[id]).filter(Boolean);
}

function isHidden(exId) {
  return !!(exerciseMeta[exId] && exerciseMeta[exId].hidden);
}

function getActiveExercises() {
  return getAllExercises().filter(ex => !isHidden(ex.id));
}

function getHiddenExercises() {
  return getAllExercises().filter(ex => isHidden(ex.id));
}

function isCustomExercise(exId) {
  return customExercises.some(e => e.id === exId);
}

function resolveIconSrc(ex) {
  if (isCustomExercise(ex.id)) {
    return ex.icon || PLACEHOLDER_ICON;
  }
  return ex.icon;
}

async function backupToServer() {
  if (BACKUP_URL.includes('REPLACE-WITH')) return; // not configured yet
  try {
    await fetch(`${BACKUP_URL}/backup`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Auth-Token': AUTH_TOKEN
      },
      body: JSON.stringify({ sessions, flags, customExercises, exerciseMeta, exerciseOrder, historyArchive })
    });
  } catch (err) {
    // silent failure — backup is best-effort, shouldn't block the user
    console.warn('Backup failed:', err);
  }
}

async function restoreFromServer() {
  if (BACKUP_URL.includes('REPLACE-WITH')) {
    alert('Backup server isn\'t configured yet.');
    return;
  }
  const confirmed = confirm('This will replace your current data on this device with the last backed-up version. Continue?');
  if (!confirmed) return;

  try {
    const res = await fetch(`${BACKUP_URL}/restore`, {
      headers: { 'X-Auth-Token': AUTH_TOKEN }
    });
    if (!res.ok) throw new Error('Restore request failed');
    const data = await res.json();
    sessions = data.sessions || [];
    flags = data.flags || {};
    customExercises = data.customExercises || [];
    exerciseMeta = data.exerciseMeta || {};
    exerciseOrder = data.exerciseOrder || null;
    historyArchive = data.historyArchive || [];
    saveJSON('wl_sessions', sessions);
    saveJSON('wl_flags', flags);
    saveJSON('wl_custom_exercises', customExercises);
    saveJSON('wl_exercise_meta', exerciseMeta);
    saveJSON('wl_exercise_order', exerciseOrder);
    saveJSON('wl_history_archive', historyArchive);
    alert('Restore complete.');
    renderHistoryScreen();
  } catch (err) {
    alert('Restore failed — check your connection and try again.');
    console.warn('Restore failed:', err);
  }
}

// Silent auto-sync: on load, adopt the server's copy if it's ahead of
// what's stored on this device — no prompts, no interruption.
async function autoSyncOnLoad() {
  if (BACKUP_URL.includes('REPLACE-WITH')) return;
  try {
    const res = await fetch(`${BACKUP_URL}/restore`, {
      headers: { 'X-Auth-Token': AUTH_TOKEN }
    });
    if (!res.ok) return;
    const data = await res.json();
    const serverSessions = data.sessions || [];
    if (serverSessions.length > sessions.length) {
      sessions = serverSessions;
      flags = data.flags || {};
      saveJSON('wl_sessions', sessions);
      saveJSON('wl_flags', flags);
    }
    const serverHistoryArchive = data.historyArchive || [];
    if (serverHistoryArchive.length > historyArchive.length) {
      historyArchive = serverHistoryArchive;
      saveJSON('wl_history_archive', historyArchive);
    }
    // custom exercises: adopt server's copy if it has more than local
    // (covers the common case of adding an exercise on one device)
    const serverCustom = data.customExercises || [];
    if (serverCustom.length > customExercises.length) {
      customExercises = serverCustom;
      exerciseMeta = data.exerciseMeta || {};
      exerciseOrder = data.exerciseOrder || null;
      saveJSON('wl_custom_exercises', customExercises);
      saveJSON('wl_exercise_meta', exerciseMeta);
      saveJSON('wl_exercise_order', exerciseOrder);
    }
  } catch (err) {
    console.warn('Auto-sync failed (offline?):', err);
  }
}
let sessionFlags = {};

function getLastEntry(exId) {
  for (let i = sessions.length - 1; i >= 0; i--) {
    if (sessions[i].entries[exId]) return sessions[i].entries[exId];
  }
  return null;
}

// --- Navigation system ---
// Real browser history only ever holds two entries: the floor (title) and
// a single "somewhere in the app" marker. How deep you actually are inside
// the app is tracked separately in navTrail. This guarantees that being on
// the title screen always means being at the true floor — pressing the
// phone's back button from title reliably exits, no matter what path led there.
let navTrail = [];

function showScreenDOM(id) {
  const current = document.querySelector('.screen.active');
  const next = document.getElementById(id);
  if (current === next) return;

  if (current) {
    current.style.transition = 'opacity 0.1s ease';
    current.style.opacity = '0';
    setTimeout(() => {
      current.classList.remove('active');
      current.style.opacity = '';
      current.style.transition = '';
      activateNext();
    }, 100);
  } else {
    activateNext();
  }

  function activateNext() {
    next.classList.add('active');
    next.style.opacity = '0';
    void next.offsetWidth; // force reflow so the transition actually runs
    next.style.transition = 'opacity 0.12s ease';
    next.style.opacity = '1';
    setTimeout(() => {
      next.style.transition = '';
      next.style.opacity = '';
    }, 130);
  }
}

// For genuine forward navigation (tapping into a deeper screen).
function navigateForward(id) {
  const wasEmpty = navTrail.length === 0;
  navTrail.push(id);
  if (wasEmpty) {
    history.pushState({ trail: [...navTrail] }, '', '#' + id);
  } else {
    history.replaceState({ trail: [...navTrail] }, '', '#' + id);
  }
  showScreenDOM(id);
}

// For a system-initiated "go home" (e.g. after saving a session) — always
// collapses cleanly back to the true floor, regardless of how deep navTrail was.
function resetToTitle() {
  if (navTrail.length > 0) {
    history.back();
  }
  navTrail = [];
  showScreenDOM('screen-title');
}

function showScreen(id) {
  // Back-compat shim for any remaining direct calls: treat as forward nav.
  navigateForward(id);
}

document.getElementById('save-btn').addEventListener('click', () => {
  const entries = {};
  const newFlags = {};

  getActiveExercises().forEach(ex => {
    const weightInput = document.querySelector(`input[data-id="${ex.id}"][data-field="weight"]`);
    const repsInput = document.querySelector(`input[data-id="${ex.id}"][data-field="reps"]`);
    const weightRaw = weightInput.value.trim();
    const weightNum = parseFloat((weightRaw.match(/[\d.]+/g) || [0]).map(Number).reduce((a, b) => Math.max(a, b), 0));
    const reps = repsInput.value.trim();
    const previousLast = getLastEntry(ex.id);

    entries[ex.id] = { weight: weightRaw, weightNum, reps };

    const wasFlagged = !!flags[ex.id];
    const flaggedThisSession = !!sessionFlags[ex.id];

    if (wasFlagged && previousLast && weightNum > previousLast.weightNum) {
      newFlags[ex.id] = false;
    } else {
      newFlags[ex.id] = flaggedThisSession;
    }
  });

  sessions.push({ date: new Date().toISOString(), entries });
  flags = newFlags;
  saveJSON('wl_sessions', sessions);
  saveJSON('wl_flags', flags);
  backupToServer();

  showSplash();
});

  saveJSON('wl_sessions', sessions);

  backupToServer();

}

function launchConfetti() {
  const layer = document.getElementById('confetti-layer');
  layer.innerHTML = '';
  const colors = ['#C1633E', '#5C6670', '#74845A', '#B7DDA8', '#E8C34A'];
  const burstPositions = [
    { x: 25, y: 30, delay: 0 },
    { x: 70, y: 22, delay: 250 },
    { x: 50, y: 40, delay: 500 },
    { x: 82, y: 45, delay: 750 }
  ];

  burstPositions.forEach(pos => {
    setTimeout(() => {
      const burst = document.createElement('div');
      burst.className = 'firework-burst';
      burst.style.left = pos.x + '%';
      burst.style.top = pos.y + '%';

      const particleCount = 16;
      for (let i = 0; i < particleCount; i++) {
        const angle = (Math.PI * 2 * i) / particleCount + (Math.random() * 0.3);
        const distance = 50 + Math.random() * 40;
        const dx = Math.cos(angle) * distance;
        const dy = Math.sin(angle) * distance;

        const particle = document.createElement('div');
        particle.className = 'firework-particle';
        particle.style.background = colors[Math.floor(Math.random() * colors.length)];
        particle.style.setProperty('--dx', dx + 'px');
        particle.style.setProperty('--dy', dy + 'px');
        particle.style.animationDelay = (Math.random() * 0.05) + 's';
        burst.appendChild(particle);
      }
      layer.appendChild(burst);
      setTimeout(() => burst.remove(), 1000);
    }, pos.delay);
  });
}

function deltaBadge(current, previous) {
  if (previous === null || previous === undefined) return { text: 'first log', cls: 'same' };
  const diff = current - previous;
  if (diff > 0) return { text: `+${diff} kg`, cls: 'up' };
  if (diff < 0) return { text: `${diff} kg`, cls: 'down' };
  return { text: 'same', cls: 'same' };
}

function formatShortDate(dateStr) {
  return new Date(dateStr).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}

function pickLabelIndices(n, maxLabels) {
  if (n <= maxLabels) return Array.from({ length: n }, (_, i) => i);
  const indices = [];
  for (let i = 0; i < maxLabels; i++) {
    indices.push(Math.round(i * (n - 1) / (maxLabels - 1)));
  }
  return [...new Set(indices)];
}

function downsampleToMilestones(points, maxPoints) {
  if (points.length <= maxPoints) return points;
  return pickLabelIndices(points.length, maxPoints).map(i => points[i]);
}

let historyViewMode = 'month';

function sparklineSVG(points, maxLabels) {
  if (points.length < 2) return '<div style="font-size:12px;color:var(--text-secondary);">not enough data yet</div>';
  const w = 260, h = 58, padX = 6, padTop = 16, padBottom = 16;
  const values = points.map(p => p.value);
  const min = Math.min(...values), max = Math.max(...values);
  const range = max - min || 1;
  const plotH = h - padTop - padBottom;

  const coords = points.map((p, i) => ({
    x: padX + (i / (points.length - 1)) * (w - padX * 2),
    y: padTop + plotH - ((p.value - min) / range) * plotH,
    value: p.value,
    date: p.date
  }));

  const polylinePoints = coords.map(c => `${c.x},${c.y}`).join(' ');
  const labelIdx = pickLabelIndices(points.length, maxLabels || 5);

  const dots = labelIdx.map(i => {
    const c = coords[i];
    return `<circle cx="${c.x}" cy="${c.y}" r="2.5" fill="currentColor"/>`;
  }).join('');

  const labels = labelIdx.map(i => {
    const c = coords[i];
    const isFirst = i === 0;
    const isLast = i === points.length - 1;
    const anchor = isFirst ? 'start' : isLast ? 'end' : 'middle';
    return `
      <text x="${c.x}" y="${padTop - 5}" font-size="9.5" fill="currentColor" text-anchor="${anchor}">${c.value}</text>
      <text x="${c.x}" y="${h - 3}" font-size="8.5" fill="currentColor" opacity="0.6" text-anchor="${anchor}">${formatShortDate(c.date)}</text>
    `;
  }).join('');

  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <polyline points="${polylinePoints}" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}
    ${labels}
  </svg>`;
}

function renderHistoryScreen() {
  const el = document.getElementById('history-cards');
  el.innerHTML = '';

  const thirtyDaysAgo = Date.now() - 30 * 24 * 60 * 60 * 1000;

  getAllExercises().forEach(ex => {
    let points = getAllSessionData()
      .filter(s => s.entries[ex.id])
      .map(s => ({ value: s.entries[ex.id].weightNum, date: s.date }));

    if (points.length === 0) return;

    let maxLabels = 5;
    if (historyViewMode === 'month') {
      const monthPoints = points.filter(p => new Date(p.date).getTime() >= thirtyDaysAgo);
      points = monthPoints.length >= 2 ? monthPoints : points.slice(-2);
    } else {
      points = downsampleToMilestones(points, 5);
    }

    const values = points.map(p => p.value);
    const current = values[values.length - 1];
    const previous = values.length > 1 ? values[values.length - 2] : null;
    const badge = deltaBadge(current, previous);

    const iconSrc = resolveIconSrc(ex);

    const card = document.createElement('div');
    card.className = 'hist-card';
    card.style.setProperty('--cat-color', CATEGORY_COLOR[ex.category]);
    card.innerHTML = `
      <div class="hist-top">
        <div class="hist-name"><img src="${iconSrc}">${ex.name}</div>
        <div class="delta ${badge.cls}">${badge.text}</div>
      </div>
      <div class="sparkline" style="color:#B84C3C">${sparklineSVG(points)}</div>
    `;
    el.appendChild(card);
  });

  if (el.children.length === 0) {
    el.innerHTML = '<div style="text-align:center;color:var(--text-secondary);margin-top:40px;">No sessions logged yet.</div>';
  }
}

function fileToResizedBase64(file, maxSize) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = maxSize;
        canvas.height = maxSize;
        const ctx = canvas.getContext('2d');
        // cover-crop to a square
        const scale = Math.max(maxSize / img.width, maxSize / img.height);
        const w = img.width * scale, h = img.height * scale;
        ctx.drawImage(img, (maxSize - w) / 2, (maxSize - h) / 2, w, h);
        resolve(canvas.toDataURL('image/png'));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

    </div>
  `;
  return row;
}

let dragState = null;

const LONG_PRESS_MS = 450;
const MOVE_CANCEL_THRESHOLD = 10;

function attachDragHandlers(row, listEl) {
  row.addEventListener('pointerdown', (e) => {
    if (e.target.closest('.row-action-btn')) return; // let Hide/Delete/Icon buttons work normally

    // All pointer types initiate dragging via the handle only. This is
    // required (not just stylistic) for touch: touch-action has to be set
    // to "none" on the handle statically in CSS, since browsers lock in
    // touch-action at pointerdown and ignore any changes made afterward
    // (e.g. once a long-press promotes a touch into a drag). Gating touch
    // drags to the handle, same as mouse, is what makes that work while
    // still letting the rest of the row scroll normally.
    if (!e.target.closest('.drag-handle')) return;

    const startX = e.clientX;
    const startY = e.clientY;

    if (e.pointerType === 'mouse') {
      let mouseDragStarted = false;
      function onMouseMoveThreshold(moveEvent) {
        const dx = Math.abs(moveEvent.clientX - startX);
        const dy = Math.abs(moveEvent.clientY - startY);
        if (!mouseDragStarted && (dx > MOVE_CANCEL_THRESHOLD || dy > MOVE_CANCEL_THRESHOLD)) {
          mouseDragStarted = true;
          document.removeEventListener('pointermove', onMouseMoveThreshold);
          document.removeEventListener('pointerup', onMouseRelease);
          document.removeEventListener('pointercancel', onMouseRelease);
          startDrag(e, startX, startY);
        }
      }
      function onMouseRelease() {
        document.removeEventListener('pointermove', onMouseMoveThreshold);
        document.removeEventListener('pointerup', onMouseRelease);
        document.removeEventListener('pointercancel', onMouseRelease);
      }
      document.addEventListener('pointermove', onMouseMoveThreshold);
      document.addEventListener('pointerup', onMouseRelease);
      document.addEventListener('pointercancel', onMouseRelease);
      return;
    }

    let longPressTimer = null;
    let dragStarted = false;

    function cancelPending() {
      clearTimeout(longPressTimer);
      document.removeEventListener('pointermove', onEarlyMove);
      document.removeEventListener('pointerup', onEarlyRelease);
      document.removeEventListener('pointercancel', onEarlyRelease);
    }

    function onEarlyMove(moveEvent) {
      const dx = Math.abs(moveEvent.clientX - startX);
      const dy = Math.abs(moveEvent.clientY - startY);
      if (dx > MOVE_CANCEL_THRESHOLD || dy > MOVE_CANCEL_THRESHOLD) {
        cancelPending(); // this is a scroll, not a long press — let it scroll normally
      }
    }

    function onEarlyRelease() {
      cancelPending(); // released (or cancelled) before long-press threshold — just a tap
    }

    document.addEventListener('pointermove', onEarlyMove);
    document.addEventListener('pointerup', onEarlyRelease);
    document.addEventListener('pointercancel', onEarlyRelease);

    longPressTimer = setTimeout(() => {
      document.removeEventListener('pointermove', onEarlyMove);
      document.removeEventListener('pointerup', onEarlyRelease);
      document.removeEventListener('pointercancel', onEarlyRelease);
      dragStarted = true;
      startDrag(e, startX, startY);
    }, LONG_PRESS_MS);
  });

  function startDrag(e, startX, startY) {
    const rect = row.getBoundingClientRect();

    const ghost = row.cloneNode(true);
    ghost.classList.add('drag-ghost');
    ghost.style.width = rect.width + 'px';
    ghost.style.left = rect.left + 'px';
    ghost.style.top = rect.top + 'px';
    document.body.appendChild(ghost);

    row.classList.add('dragging-placeholder');

    dragState = {
      row, listEl, ghost,
      offsetX: startX - rect.left,
      offsetY: startY - rect.top
    };

    document.addEventListener('pointermove', onDragMove);
    document.addEventListener('pointerup', onDragEnd);
    document.addEventListener('pointercancel', onDragEnd);
  }

  function onDragMove(e) {
    if (!dragState || dragState.row !== row) return;
    const { ghost, offsetX, offsetY } = dragState;
    ghost.style.left = (e.clientX - offsetX) + 'px';
    ghost.style.top = (e.clientY - offsetY) + 'px';

    const rows = Array.from(listEl.children).filter(r => r !== row);
    const hoveredRow = rows.find(r => {
      const rBox = r.getBoundingClientRect();
      return e.clientY >= rBox.top && e.clientY <= rBox.bottom;
    });
    if (hoveredRow) {
      const hBox = hoveredRow.getBoundingClientRect();
      const hoveredMid = hBox.top + hBox.height / 2;

      // FLIP: record each other row's position before the reorder
      const otherRows = Array.from(listEl.children).filter(r => r !== row);
      const firstRects = new Map();
      otherRows.forEach(r => firstRects.set(r, r.getBoundingClientRect()));

      if (e.clientY < hoveredMid) {
        listEl.insertBefore(row, hoveredRow);
      } else {
        listEl.insertBefore(row, hoveredRow.nextSibling);
      }

      // FLIP: animate each row from its old position to its new one
      otherRows.forEach(r => {
        const first = firstRects.get(r);
        const last = r.getBoundingClientRect();
        const dy = first.top - last.top;
        if (dy !== 0) {
          r.style.transition = 'none';
          r.style.transform = `translateY(${dy}px)`;
          requestAnimationFrame(() => {
            r.style.transition = 'transform 0.2s ease';
            r.style.transform = '';
          });
        }
      });
    }
  }

  function onDragEnd() {
    if (!dragState || dragState.row !== row) return;
    dragState.ghost.remove();
    row.classList.remove('dragging-placeholder');
    const newActiveOrder = Array.from(listEl.children).map(r => r.dataset.id);
    const hiddenIds = getHiddenExercises().map(e => e.id);
    exerciseOrder = [...newActiveOrder, ...hiddenIds];
    saveCustomExercises();
    dragState = null;
    document.removeEventListener('pointermove', onDragMove);
    document.removeEventListener('pointerup', onDragEnd);
    document.removeEventListener('pointercancel', onDragEnd);
  }
}

function renderManageExercisesScreen() {
  // Defensive cleanup: remove any stray ghosts/drag state from an interrupted
  // gesture on a previous visit, so nothing can accumulate indefinitely.
  document.querySelectorAll('.drag-ghost').forEach(g => g.remove());
  dragState = null;

  const activeList = document.getElementById('active-exercise-list');
  const hiddenList = document.getElementById('hidden-exercise-list');
  activeList.innerHTML = '';
  hiddenList.innerHTML = '';

  getActiveExercises().forEach(ex => {
    const row = renderExerciseRow(ex, false);
    activeList.appendChild(row);
    attachDragHandlers(row, activeList);
  });

  getHiddenExercises().forEach(ex => {
    const row = renderExerciseRow(ex, true);
    hiddenList.appendChild(row);
  });

  if (getHiddenExercises().length === 0) {
    hiddenList.innerHTML = '<div style="color:var(--text-secondary);font-size:14px;">No hidden exercises.</div>';
  }

  [activeList, hiddenList].forEach(list => {
    list.querySelectorAll('.row-action-btn').forEach(btn => {
      btn.addEventListener('click', () => handleExerciseRowAction(btn));
    });
  });
}

function handleExerciseRowAction(btn) {
  const row = btn.closest('.exercise-row');
  const id = row.dataset.id;
  const action = btn.dataset.action;

  if (action === 'toggle') {
    const currentlyHidden = isHidden(id);
    exerciseMeta[id] = { hidden: !currentlyHidden };
    saveCustomExercises();
    renderManageExercisesScreen();
  } else if (action === 'delete') {
    const ex = getAllExercises().find(e => e.id === id);
    const confirmed = confirm(`Delete "${ex.name}" permanently? This cannot be undone.`);
    if (!confirmed) return;
    customExercises = customExercises.filter(e => e.id !== id);
    delete exerciseMeta[id];
    exerciseOrder = exerciseOrder.filter(exId => exId !== id);
    saveCustomExercises();
    renderManageExercisesScreen();
  } else if (action === 'icon') {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = async () => {
      if (!input.files[0]) return;
      const dataUrl = await fileToResizedBase64(input.files[0], 120);
      const ex = customExercises.find(e => e.id === id);
      ex.icon = dataUrl;
      saveCustomExercises();
      renderManageExercisesScreen();
    };
    input.click();
  }
}

async function exportAllData() {
  const payload = {
    exportedAt: new Date().toISOString(),
    sessions, flags, customExercises, exerciseMeta, exerciseOrder
  };
  const json = JSON.stringify(payload, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const today = new Date().toISOString().split('T')[0];
  const filename = `logit-full-backup-${today}.json`;
  const file = new File([blob], filename, { type: 'application/json' });

  if (navigator.share) {
    try {
      await navigator.share({ files: [file], title: 'LogIt full backup', text: 'LogIt full data export' });
      return;
    } catch (err) {
      if (err.name === 'AbortError') return;
    }
  }
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

});
document.getElementById('btn-backups').addEventListener('click', () => {
  showScreen('screen-backups');
});
document.getElementById('btn-settings').addEventListener('click', () => showScreen('screen-settings'));
document.getElementById('btn-back-title-settings').addEventListener('click', () => history.back());
document.getElementById('btn-back-settings-1').addEventListener('click', () => history.back());
document.getElementById('btn-back-settings-2').addEventListener('click', () => history.back());
document.getElementById('btn-back-manage-1').addEventListener('click', () => history.back());

let preparedExportFile = null;

function buildExportFile() {
  const rows = [];
  const lastSession = sessions[sessions.length - 1];
  const dateStr = lastSession
    ? new Date(lastSession.date).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' })
    : '';

  getAllExercises().forEach(ex => {
    const entry = getLastEntry(ex.id);
    if (entry) {
      rows.push({
        Date: dateStr,
        Exercise: ex.name,
        'Weight (kg)': entry.weight,
        Reps: entry.reps
      });
    }
  });

  if (rows.length === 0) {
    preparedExportFile = null;
    return;
  }

  // CSV, not xlsx: Chrome's Web Share API only shares a fixed allow-list of
  // file types (PDF, images, audio, video, plain text/CSV) — .xlsx isn't on
  // it and will always be rejected. CSV still opens fine in Excel/Sheets.
  const worksheet = XLSX.utils.json_to_sheet(rows);
  const csv = XLSX.utils.sheet_to_csv(worksheet);

  const today = new Date().toISOString().split('T')[0];
  const filename = `workout-log-${today}.csv`;
  const mimeType = 'text/csv';
  const blob = new Blob([csv], { type: mimeType });
  preparedExportFile = new File([blob], filename, { type: mimeType });
}

async function exportToExcel() {
  // File is already built (see btn-backups handler below) so this handler
  // does nothing but share/download immediately.
  if (!preparedExportFile) {
    buildExportFile(); // fallback, in case this screen was reached some other way
  }

  if (!preparedExportFile) {
    alert('No sessions logged yet — nothing to export.');
    return;
  }

  const file = preparedExportFile;

  if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], title: 'LogIt export', text: 'My LogIt export' });
      return;
    } catch (err) {
      if (err.name === 'AbortError') return; // user cancelled — don't also trigger a download
      // any other failure: fall through to plain download below
    }
  }

  const url = URL.createObjectURL(file);
  const a = document.createElement('a');
  a.href = url;
  a.download = file.name;
  a.click();
  URL.revokeObjectURL(url);
}

document.getElementById('export-btn').addEventListener('pointerdown', buildExportFile);
document.getElementById('export-btn').addEventListener('click', exportToExcel);
document.getElementById('restore-btn').addEventListener('click', restoreFromServer);
document.getElementById('btn-back-title').addEventListener('click', () => history.back());
document.getElementById('btn-back-title-2').addEventListener('click', () => history.back());

// Set up the initial history entry so the very first screen (title) is
// the "floor" — the phone's back button from here exits normally, but
// from any other screen it steps back one screen within the app.
history.replaceState({ trail: [] }, '', '#screen-title');

window.addEventListener('popstate', () => {
  navTrail.pop();
  if (navTrail.length === 0) {
    showScreenDOM('screen-title');
  } else {
    const prevScreen = navTrail[navTrail.length - 1];
    showScreenDOM(prevScreen);
    history.pushState({ trail: [...navTrail] }, '', '#' + prevScreen);
    if (prevScreen === 'screen-history') renderHistoryScreen();
    if (prevScreen === 'screen-manage-exercises') renderManageExercisesScreen();
  }
});

autoSyncOnLoad();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
